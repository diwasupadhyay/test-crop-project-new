services:
  # ── Backend API ─────────────────────────────
  server:
    build: ./server
    container_name: test-crop-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    networks:
      - crop-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── ML Microservice (Python/Flask) ──────────
  ml-service:
    build:
      context: ./ml-service
      network: host
    container_name: test-crop-ml
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./ml-service/.env
    volumes:
      - ml-data:/app/data
      - ml-models:/app/models
    networks:
      - crop-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 120s

  # ── Frontend (Nginx + React) ────────────────
  client:
    build:
      context: ./client
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    container_name: test-crop-client
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      server:
        condition: service_healthy
    networks:
      - crop-network

volumes:
  ml-data:
  ml-models:

networks:
  crop-network:
    driver: bridge
